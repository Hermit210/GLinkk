<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - G-Link</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Manrope', 'sans-serif'],
          },
          colors: {
            gold: {
              DEFAULT: '#FFD700',
              light: '#FFED4E',
              dark: '#FFA500',
            },
            dark: {
              DEFAULT: '#0a0a0a',
              card: '#111111',
              border: '#222222'
            }
          },
          animation: {
            'fade-in-up': 'fadeInUp 0.8s ease-out forwards',
          },
          keyframes: {
            fadeInUp: {
              '0%': { opacity: '0', transform: 'translateY(20px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            }
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #0a0a0a;
      color: #ffffff;
    }

    .bg-site {
      background-image: radial-gradient(circle at 50% 0%, rgba(255, 215, 0, 0.1) 0%, transparent 50%);
    }

    /* Custom inputs */
    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus,
    input:-webkit-autofill:active {
      -webkit-box-shadow: 0 0 0 30px #111111 inset !important;
      -webkit-text-fill-color: white !important;
      transition: background-color 5000s ease-in-out 0s;
    }
  </style>
</head>

<body class="antialiased font-sans flex flex-col min-h-screen selection:bg-gold selection:text-black">

  <!-- Navigation -->
  <nav class="absolute w-full z-50 px-6 py-6 flex justify-between items-center" id="navbar">
    <a href="/" class="text-2xl font-bold tracking-tight text-white flex items-center gap-2 group">
      <span class="text-gold group-hover:rotate-12 transition-transform duration-300">🪙</span>
      G-Link
    </a>
    <div class="flex items-center gap-4">
      <a href="signup.html"
        class="bg-white/10 backdrop-blur-md text-white px-6 py-2.5 rounded-full text-sm font-bold hover:bg-white hover:text-black transition-colors duration-300 tracking-wide border border-white/20">
        Sign Up
      </a>
    </div>
  </nav>

  <!-- Login Main Area -->
  <main class="flex-grow flex items-center justify-center p-6 bg-site">
    <div class="w-full max-w-[420px] animate-fade-in-up">

      <!-- Header -->
      <div class="text-center mb-10">
        <div
          class="w-16 h-16 rounded-full bg-dark-card border border-dark-border flex items-center justify-center mx-auto mb-6 shadow-[0_0_30px_rgba(255,215,0,0.1)]">
          <span class="text-3xl text-gold">🪙</span>
        </div>
        <h1 class="text-4xl font-extrabold tracking-tight mb-2">Welcome Back</h1>
        <p class="text-gray-400 font-medium">Log in securely to access your gold vault.</p>
      </div>

      <!-- Login Card -->
      <div
        class="bg-dark-card backdrop-blur-xl border border-dark-border rounded-3xl p-8 shadow-2xl relative overflow-hidden">
        <!-- Subtle gradient overlay -->
        <div class="absolute -top-10 -right-10 w-40 h-40 bg-gold/10 blur-3xl rounded-full pointer-events-none"></div>

        <div class="text-center mb-6" id="msg2" style="display: none;"></div>

        <!-- Google Login Button -->
        <a href="/auth/google"
          class="w-full flex items-center justify-center gap-3 bg-white text-black py-3.5 px-4 rounded-xl font-bold hover:bg-gray-100 transition-colors duration-200 mb-6 group shadow-lg">
          <img src="https://www.google.com/favicon.ico" class="w-5 h-5 group-hover:scale-110 transition-transform">
          Continue with Google
        </a>

        <!-- Divider -->
        <div class="flex items-center my-6">
          <div class="flex-grow h-px bg-dark-border"></div>
          <span class="px-4 text-xs font-bold text-gray-500 uppercase tracking-widest">or email</span>
          <div class="flex-grow h-px bg-dark-border"></div>
        </div>

        <!-- Email Form -->
        <form onsubmit="login(); return false;" class="space-y-4">
          <div>
            <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">
              Email Address
            </label>
            <div class="relative">
              <i data-lucide="mail" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-500"></i>
              <input type="email" id="email" placeholder="you@example.com"
                class="w-full pl-12 pr-4 py-3.5 bg-dark border border-dark-border text-white rounded-xl focus:border-gold focus:ring-1 focus:ring-gold focus:outline-none transition-all placeholder:text-gray-600"
                required>
            </div>
          </div>

          <div class="pb-2">
            <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">
              Password
            </label>
            <div class="relative">
              <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-500"></i>
              <input type="password" id="password" placeholder="••••••••"
                class="w-full pl-12 pr-4 py-3.5 bg-dark border border-dark-border text-white rounded-xl focus:border-gold focus:ring-1 focus:ring-gold focus:outline-none transition-all placeholder:text-gray-600"
                required>
            </div>
          </div>

          <button type="submit"
            class="w-full bg-gold text-black font-bold py-4 px-6 rounded-xl hover:bg-gold-light hover:scale-[1.02] shadow-[0_0_20px_rgba(255,215,0,0.2)] transition-all duration-300 ease-out flex justify-center items-center gap-2 group">
            Log In
            <i data-lucide="arrow-right" class="w-5 h-5 group-hover:translate-x-1 transition-transform"></i>
          </button>
        </form>
      </div>

    </div>
  </main>

  <script>
    lucide.createIcons();

    async function login() {
      const email = document.getElementById('email').value.trim()
      const password = document.getElementById('password').value.trim()

      if (!email || !password) {
        showMsg('Please fill all fields', 'err', 'msg2');
        return;
      }

      showMsg('Logging in...', 'info', 'msg2')

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        })
        const data = await res.json()
        if (data.success) {
          localStorage.setItem('glink_user', JSON.stringify(data.user))
          showMsg('Welcome back! Redirecting...', 'ok', 'msg2')
          setTimeout(() => window.location.href = 'dashboard.html', 1500)
        } else {
          showMsg(data.error || 'Invalid credentials', 'err', 'msg2')
        }
      } catch (e) {
        showMsg('Login failed: ' + e.message, 'err', 'msg2')
      }
    }

    function showMsg(msg, type, id = 'msg2') {
      const el = document.getElementById(id)
      el.textContent = msg

      // Base styles
      let baseClass = 'text-sm font-semibold mb-6 p-3 rounded-lg border flex items-center justify-center gap-2 animate-fade-in-up '

      if (type === 'ok') {
        el.className = baseClass + 'text-green-400 bg-green-500/10 border-green-500/20'
      } else if (type === 'err') {
        el.className = baseClass + 'text-red-400 bg-red-500/10 border-red-500/20'
      } else {
        el.className = baseClass + 'text-blue-400 bg-blue-500/10 border-blue-500/20'
      }

      el.style.display = 'block'
    }

    document.addEventListener('keypress', e => {
      if (e.key === 'Enter') login()
    });
  </script>
</body>

</html>
