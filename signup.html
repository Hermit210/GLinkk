<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - G-Link</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Manrope', 'sans-serif'],
          },
          colors: {
            gold: {
              DEFAULT: '#FFD700',
              light: '#FFED4E',
              dark: '#FFA500',
            },
            dark: {
              DEFAULT: '#0a0a0a',
              card: '#111111',
              border: '#222222'
            }
          },
          animation: {
            'fade-in-up': 'fadeInUp 0.8s ease-out forwards',
          },
          keyframes: {
            fadeInUp: {
              '0%': { opacity: '0', transform: 'translateY(20px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            }
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #0a0a0a;
      color: #ffffff;
    }

    .bg-site {
      background-image: radial-gradient(circle at 50% 0%, rgba(255, 215, 0, 0.1) 0%, transparent 50%);
    }

    /* Custom inputs */
    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus,
    input:-webkit-autofill:active {
      -webkit-box-shadow: 0 0 0 30px #111111 inset !important;
      -webkit-text-fill-color: white !important;
      transition: background-color 5000s ease-in-out 0s;
    }
  </style>
</head>

<body class="antialiased font-sans flex flex-col min-h-screen selection:bg-gold selection:text-black">

  <!-- Navigation -->
  <nav class="absolute w-full z-50 px-6 py-6 flex justify-between items-center" id="navbar">
    <a href="/" class="text-2xl font-bold tracking-tight text-white flex items-center gap-2 group">
      <span class="text-gold group-hover:rotate-12 transition-transform duration-300">🪙</span>
      G-Link
    </a>
    <div class="flex items-center gap-4">
      <a href="login.html"
        class="bg-white/10 backdrop-blur-md text-white px-6 py-2.5 rounded-full text-sm font-bold hover:bg-white hover:text-black transition-colors duration-300 tracking-wide border border-white/20">
        Log In
      </a>
    </div>
  </nav>

  <!-- Login Main Area -->
  <main class="flex-grow flex items-center justify-center p-4 bg-site min-h-screen pt-[15vh]">
    <div class="w-full max-w-[420px] animate-fade-in-up">

      <!-- Header -->
      <div class="text-center mb-6">
        <div
          class="w-12 h-12 rounded-full bg-dark-card border border-dark-border flex items-center justify-center mx-auto mb-3 shadow-[0_0_30px_rgba(255,215,0,0.1)]">
          <span class="text-2xl text-gold">🪙</span>
        </div>
        <h1 class="text-3xl font-extrabold tracking-tight mb-1">Create Account</h1>
        <p class="text-gray-400 font-medium text-sm">Start sending gold in seconds.</p>
      </div>

      <!-- Login Card -->
      <div
        class="bg-dark-card backdrop-blur-xl border border-dark-border rounded-2xl p-6 shadow-2xl relative overflow-hidden">
        <!-- Subtle gradient overlay -->
        <div class="absolute -top-10 -right-10 w-40 h-40 bg-gold/10 blur-3xl rounded-full pointer-events-none"></div>

        <div class="text-center mb-4" id="msg" style="display: none;"></div>

        <!-- Google Login Button -->
        <a href="/auth/google"
          class="w-full flex items-center justify-center gap-3 bg-white text-black py-2.5 px-4 rounded-xl font-bold hover:bg-gray-100 transition-colors duration-200 mb-4 group shadow-lg text-sm">
          <img src="https://www.google.com/favicon.ico" class="w-4 h-4 group-hover:scale-110 transition-transform">
          Continue with Google
        </a>

        <!-- Divider -->
        <div class="flex items-center my-4">
          <div class="flex-grow h-px bg-dark-border"></div>
          <span class="px-3 text-[10px] font-bold text-gray-500 uppercase tracking-widest">or email</span>
          <div class="flex-grow h-px bg-dark-border"></div>
        </div>

        <!-- Email Form -->
        <div class="space-y-3">
          <div>
            <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1">
              Full Name
            </label>
            <div class="relative">
              <i data-lucide="user" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500"></i>
              <input type="text" id="name" placeholder="John Doe"
                class="w-full pl-9 pr-3 py-2 text-sm bg-dark border border-dark-border text-white rounded-lg focus:border-gold focus:ring-1 focus:ring-gold focus:outline-none transition-all placeholder:text-gray-600">
            </div>
          </div>

          <div>
            <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1">
              Email Address
            </label>
            <div class="relative">
              <i data-lucide="mail" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500"></i>
              <input type="email" id="email" placeholder="you@example.com"
                class="w-full pl-9 pr-3 py-2 text-sm bg-dark border border-dark-border text-white rounded-lg focus:border-gold focus:ring-1 focus:ring-gold focus:outline-none transition-all placeholder:text-gray-600">
            </div>
          </div>

          <div>
            <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1">
              Phone Number
            </label>
            <div class="relative">
              <i data-lucide="phone" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500"></i>
              <input type="tel" id="phone" placeholder="9999999999"
                class="w-full pl-9 pr-3 py-2 text-sm bg-dark border border-dark-border text-white rounded-lg focus:border-gold focus:ring-1 focus:ring-gold focus:outline-none transition-all placeholder:text-gray-600">
            </div>
          </div>

          <div>
            <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1">
              Password
            </label>
            <div class="relative">
              <i data-lucide="lock" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500"></i>
              <input type="password" id="password" placeholder="••••••••"
                class="w-full pl-9 pr-3 py-2 text-sm bg-dark border border-dark-border text-white rounded-lg focus:border-gold focus:ring-1 focus:ring-gold focus:outline-none transition-all placeholder:text-gray-600">
            </div>
          </div>

          <div class="pb-1">
            <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1">
              Confirm Password
            </label>
            <div class="relative">
              <i data-lucide="check-circle" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500"></i>
              <input type="password" id="confirm" placeholder="••••••••"
                class="w-full pl-9 pr-3 py-2 text-sm bg-dark border border-dark-border text-white rounded-lg focus:border-gold focus:ring-1 focus:ring-gold focus:outline-none transition-all placeholder:text-gray-600">
            </div>
          </div>

          <button id="sendOtpBtn" onclick="sendOTP()"
            class="w-full bg-gold text-black font-bold py-3 px-6 rounded-lg hover:bg-gold-light hover:scale-[1.02] shadow-[0_0_20px_rgba(255,215,0,0.2)] transition-all duration-300 ease-out flex justify-center items-center gap-2 group mt-1 text-sm">
            Send OTP to Email
            <i data-lucide="mail-check" class="w-4 h-4 group-hover:translate-x-1 transition-transform"></i>
          </button>
        </div>

        <!-- OTP Verification Section -->
        <div id="otpSection" class="hidden mt-4 pt-4 border-t border-dark-border">
          <p class="text-gold text-[11px] text-center mb-3 font-bold">Check your email for the OTP</p>
          <div class="pb-3">
            <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1">
              Enter 6-digit OTP
            </label>
            <div class="relative">
              <i data-lucide="key" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500"></i>
              <input type="text" id="otp" placeholder="123456" maxlength="6"
                class="w-full pl-9 pr-3 py-2 text-sm bg-dark border border-dark-border text-white rounded-lg focus:border-gold focus:ring-1 focus:ring-gold focus:outline-none transition-all placeholder:text-gray-600 font-mono tracking-[0.2em] text-center">
            </div>
          </div>
          <button id="verifyBtn" onclick="verifyAndSignup()"
            class="w-full bg-green-500 text-black font-bold py-3 px-6 text-sm rounded-lg hover:bg-green-400 hover:scale-[1.02] shadow-[0_0_20px_rgba(34,197,94,0.2)] transition-all duration-300 ease-out flex justify-center items-center gap-2 group">
            Verify & Create Account
            <i data-lucide="check" class="w-4 h-4"></i>
          </button>
        </div>
      </div>

    </div>
  </main>

  <script>
    lucide.createIcons();

    function showMsg(msg, type) {
      const el = document.getElementById('msg')
      if (!el) {
        alert(msg)
        return
      }
      el.textContent = msg

      // Base styles
      let baseClass = 'text-sm font-semibold mb-6 p-3 rounded-lg border flex items-center justify-center gap-2 animate-fade-in-up '

      if (type === 'ok') {
        el.className = baseClass + 'text-green-400 bg-green-500/10 border-green-500/20'
      } else if (type === 'err') {
        el.className = baseClass + 'text-red-400 bg-red-500/10 border-red-500/20'
      } else {
        el.className = baseClass + 'text-blue-400 bg-blue-500/10 border-blue-500/20'
      }

      el.style.display = 'block'
    }

    async function sendOTP() {
      const name = document.getElementById('name').value.trim()
      const email = document.getElementById('email').value.trim()

      if (!name || !email) {
        showMsg('Please enter name and email first', 'err')
        return
      }

      showMsg('Sending OTP to ' + email + '...', 'info')
      document.getElementById('sendOtpBtn').disabled = true
      document.getElementById('sendOtpBtn').classList.add('opacity-50', 'cursor-not-allowed')

      try {
        const controller = new AbortController()
        const timeout = setTimeout(() => controller.abort(), 15000)

        const res = await fetch('/api/auth/send-otp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
          signal: controller.signal
        })

        clearTimeout(timeout)
        const data = await res.json()

        if (data.success) {
          showMsg('✅ OTP sent to ' + email + '! Check inbox and spam folder', 'ok')
          document.getElementById('otpSection').classList.remove('hidden')
          document.getElementById('sendOtpBtn').style.display = 'none'
        } else {
          showMsg(data.error || 'Failed', 'err')
          document.getElementById('sendOtpBtn').disabled = false
          document.getElementById('sendOtpBtn').classList.remove('opacity-50', 'cursor-not-allowed')
        }
      } catch (e) {
        if (e.name === 'AbortError') {
          showMsg('Server timeout. Try again!', 'err')
        } else {
          showMsg('Error: ' + e.message, 'err')
        }
        document.getElementById('sendOtpBtn').disabled = false
        document.getElementById('sendOtpBtn').classList.remove('opacity-50', 'cursor-not-allowed')
      }
    }

    async function verifyAndSignup() {
      const name = document.getElementById('name').value.trim()
      const email = document.getElementById('email').value.trim()
      const phone = document.getElementById('phone').value.trim()
      const password = document.getElementById('password').value.trim()
      const otp = document.getElementById('otp').value.trim()

      if (!name || !email || !password || !otp) {
        showMsg('Please fill all required fields', 'err')
        return
      }

      showMsg('Verifying OTP...', 'info')
      document.getElementById('verifyBtn').disabled = true
      document.getElementById('verifyBtn').classList.add('opacity-50', 'cursor-not-allowed')

      try {
        const verifyRes = await fetch('/api/auth/verify-otp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, otp })
        })
        const verifyData = await verifyRes.json()

        if (!verifyData.success) {
          showMsg(verifyData.error || 'Wrong OTP', 'err')
          document.getElementById('verifyBtn').disabled = false
          document.getElementById('verifyBtn').classList.remove('opacity-50', 'cursor-not-allowed')
          return
        }

        showMsg('Creating account...', 'info')

        const signupRes = await fetch('/api/auth/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, phone, password })
        })
        const signupData = await signupRes.json()

        if (signupData.success) {
          localStorage.setItem('glink_user', JSON.stringify(signupData.user))
          showMsg('Account created! Redirecting...', 'ok')
          setTimeout(() => window.location.href = 'dashboard.html', 1500)
        } else {
          showMsg(signupData.error || 'Signup failed', 'err')
          document.getElementById('verifyBtn').disabled = false
          document.getElementById('verifyBtn').classList.remove('opacity-50', 'cursor-not-allowed')
        }
      } catch (e) {
        showMsg('Error: ' + e.message, 'err')
        document.getElementById('verifyBtn').disabled = false
        document.getElementById('verifyBtn').classList.remove('opacity-50', 'cursor-not-allowed')
      }
    }
  </script>
</body>

</html>
