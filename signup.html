<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up - G-Link</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<link rel="stylesheet" href="enhanced-styles.css">
<style>
  :root {
    --gold-primary: #D4AF37;
    --gold-light: #F4D03F;
    --gold-dark: #B8941E;
    --bg-dark: #0a0a0a;
    --bg-card: #161616;
    --bg-elevated: #1f1f1f;
    --text-light: #f0f0f0;
    --text-muted: #a0a0a0;
    --border-gold: rgba(212, 175, 55, 0.3);
    --shadow-gold: 0 4px 20px rgba(212, 175, 55, 0.15);
    --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  
  .bg-site { background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%); }
  .text-gold { color: var(--gold-primary); }
  .bg-gold { background: var(--gold-primary); }
  .hover\:bg-gold:hover { background: var(--gold-dark); }
  .text-white { color: #fff; }
  .text-gray-400 { color: var(--text-muted); }
  .text-red-400 { color: #f44336; }
  .text-green-400 { color: #4CAF50; }
  .text-blue-400 { color: #64B5F6; }
  .bg-gray-700 { background: #333; }
  .bg-gray-800 { background: #1a1a1a; }
  .bg-gray-600 { background: #555; }
  .hover\:bg-gray-500:hover { background: #666; }
  .border-gray-600 { border-color: #333; }
  .focus\:border-gold:focus { border-color: var(--gold-primary); }
  .card-gold { background: var(--bg-card); border: 1px solid var(--border-gold); border-radius: 20px; box-shadow: var(--shadow-gold); transition: var(--transition); }
  .card-gold:hover { transform: translateY(-5px); border-color: var(--gold-light); box-shadow: 0 8px 30px rgba(212, 175, 55, 0.2); }
  .btn-gold { background: linear-gradient(135deg, var(--gold-primary) 0%, var(--gold-dark) 100%); color: #000; font-weight: 700; transition: var(--transition); }
  .btn-outline-gold:hover { background: var(--gold-primary); color: #000; box-shadow: 0 6px 20px rgba(212, 175, 55, 0.2); }
  
  .msg.ok { color: #4CAF50; }
  .msg.err { color: #f44336; }
  .msg.info { color: #2196F3; }
  .btn-green { background: #4CAF50; color: #fff; font-weight: 700; transition: var(--transition); }
  .btn-green:hover { background: #45a049; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(76, 175, 80, 0.3); }
</style>
</head>
<body class="text-white font-sans" style="background: linear-gradient(135deg, #000000 0%, #1a1a1a 50%, #0a0a0a 100%); min-height: 100vh;">
  <header class="bg-card border-b border-gold py-4 px-6 shadow-lg" style="background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(212, 175, 55, 0.3);">
    <div class="max-w-6xl mx-auto flex items-center justify-between">
      <a href="index.html" class="flex items-center text-gold font-bold text-xl hover:text-gold-light transition">
        <img src="logo.svg" alt="G-Link Logo" class="w-8 h-8 mr-2">
        <span class="hidden sm:inline">G-Link</span>
      </a>
      <nav class="hidden md:flex space-x-6 lg:space-x-8">
        <a href="index.html" class="flex items-center text-white hover:text-gold transition">
          <i data-lucide="home" class="w-5 h-5 mr-2"></i>
          Home
        </a>
        <a href="login.html" class="flex items-center text-white hover:text-gold transition">
          <i data-lucide="log-in" class="w-5 h-5 mr-2"></i>
          <span class="hidden lg:inline">Login</span>
          <span class="lg:hidden">Login</span>
        </a>
        <button id="themeToggle" class="text-white hover:text-gold transition">
          <i data-lucide="moon" class="w-5 h-5"></i>
        </button>
      </nav>
      
      <!-- Mobile Menu Button -->
      <button id="mobileMenuBtn" class="md:hidden text-gold hover:text-gold-light transition">
        <i data-lucide="menu" class="w-6 h-6"></i>
      </button>
    </div>
    
    <!-- Mobile Menu -->
    <div id="mobileMenu" class="hidden md:hidden mt-4 pb-4 border-t border-gold pt-4">
      <nav class="flex flex-col space-y-3">
        <a href="index.html" class="flex items-center text-white hover:text-gold transition py-2">
          <i data-lucide="home" class="w-5 h-5 mr-3"></i>
          Home
        </a>
        <a href="login.html" class="flex items-center text-white hover:text-gold transition py-2">
          <i data-lucide="log-in" class="w-5 h-5 mr-3"></i>
          Login
        </a>
        <button id="themeToggleMobile" class="flex items-center text-white hover:text-gold transition py-2">
          <i data-lucide="moon" class="w-5 h-5 mr-3"></i>
          Toggle Theme
        </button>
      </nav>
    </div>
  </header>

<div class="flex items-center justify-center p-4 min-h-screen">
<div class="w-full max-w-md">
  <div class="text-center mb-8">
    <img src="logo.svg" alt="G-Link Logo" class="w-20 h-20 mx-auto mb-4 animate-bounce-in">
    <h1 class="text-4xl md:text-5xl font-bold text-gold mb-2">🪙 G-Link</h1>
    <p class="text-gray-400 text-sm">Send gold as easily as sending a link</p>
  </div>
  <div class="card-gold p-8">
    <h2 class="text-2xl font-semibold text-white mb-2 text-center">Create Account</h2>
    <p class="text-gray-400 text-sm text-center mb-6">Start sending gold in seconds</p>
    <div class="text-center mb-4" id="msg"></div>

    <!-- Google Login Button -->
    <a href="/auth/google" style="
      display:flex;align-items:center;justify-content:center;
      gap:12px;width:100%;padding:14px;margin-bottom:16px;
      background:#fff;color:#333;border:none;
      border-radius:12px;text-decoration:none;
      font-size:15px;font-weight:600;cursor:pointer;
      box-shadow:0 2px 8px rgba(0,0,0,0.3)">
      <img src="https://www.google.com/favicon.ico" width="20" height="20">
      Continue with Google
    </a>

    <div class="flex items-center my-6">
      <div class="flex-1 border-t border-gray-600"></div>
      <span class="px-3 text-gray-400 text-sm">OR USE EMAIL</span>
      <div class="flex-1 border-t border-gray-600"></div>
    </div>

    <label class="block text-white mb-2">Full Name</label>
    <input type="text" id="name" placeholder="Your full name" class="w-full p-3 bg-gray-700 text-white rounded-xl border border-gray-600 focus:border-gold focus:outline-none mb-4 transition">

    <label class="block text-white mb-2">Email</label>
    <input type="email" id="email" placeholder="your@email.com" class="w-full p-3 bg-gray-700 text-white rounded-xl border border-gray-600 focus:border-gold focus:outline-none mb-4 transition">

    <label class="block text-white mb-2">Phone</label>
    <input type="tel" id="phone" placeholder="9999999999" class="w-full p-3 bg-gray-700 text-white rounded-xl border border-gray-600 focus:border-gold focus:outline-none mb-4 transition">

    <label class="block text-white mb-2">Password</label>
    <input type="password" id="password" placeholder="Create password" class="w-full p-3 bg-gray-700 text-white rounded-xl border border-gray-600 focus:border-gold focus:outline-none mb-4 transition">

    <label class="block text-white mb-2">Confirm Password</label>
    <input type="password" id="confirm" placeholder="Repeat password" class="w-full p-3 bg-gray-700 text-white rounded-xl border border-gray-600 focus:border-gold focus:outline-none mb-4 transition">

    <button id="sendOtpBtn" class="w-full btn-gold py-4 px-6 rounded-xl hover:bg-gold transition duration-200" onclick="sendOTP()">Send OTP to Email</button>
    <a href="login.html" class="block text-center text-gray-400 hover:text-white mt-4 transition">Already have account? Login →</a>

    <div id="otpSection" class="hidden mt-6">
      <p class="text-gray-400 text-sm text-center mb-4">Check your email for OTP</p>
      <label class="block text-white mb-2">Enter 6-digit OTP</label>
      <input type="text" id="otp" placeholder="123456" maxlength="6" class="w-full p-3 bg-gray-700 text-white rounded-xl border border-gray-600 focus:border-gold focus:outline-none mb-4 transition">
      <button id="verifyBtn" class="w-full btn-green py-4 px-6 rounded-xl hover:bg-green-400 transition duration-200" onclick="verifyAndSignup()">Verify & Create Account</button>
    </div>

    <p class="text-center text-gray-400 text-xs mt-6">Powered by Oro GRAIL | Solana Blockchain</p>
  </div>
</div>


<script>
lucide.createIcons();

// Mobile menu toggle
const mobileMenuBtn = document.getElementById('mobileMenuBtn');
const mobileMenu = document.getElementById('mobileMenu');
if (mobileMenuBtn && mobileMenu) {
  mobileMenuBtn.addEventListener('click', () => {
    mobileMenu.classList.toggle('hidden');
    const icon = mobileMenuBtn.querySelector('i');
    if (mobileMenu.classList.contains('hidden')) {
      icon.setAttribute('data-lucide', 'menu');
    } else {
      icon.setAttribute('data-lucide', 'x');
    }
    lucide.createIcons();
  });
}

// Theme toggle
const themeToggle = document.getElementById('themeToggle');
const themeToggleMobile = document.getElementById('themeToggleMobile');

function toggleTheme() {
  document.body.classList.toggle('light-theme');
  const icons = document.querySelectorAll('#themeToggle i, #themeToggleMobile i');
  icons.forEach(icon => {
    if (document.body.classList.contains('light-theme')) {
      icon.setAttribute('data-lucide', 'sun');
    } else {
      icon.setAttribute('data-lucide', 'moon');
    }
  });
  lucide.createIcons();
}

if (themeToggle) themeToggle.addEventListener('click', toggleTheme);
if (themeToggleMobile) themeToggleMobile.addEventListener('click', toggleTheme);

async function sendOTP() {
  const name = document.getElementById('name').value.trim()
  const email = document.getElementById('email').value.trim()
  
  if (!name || !email) {
    showMsg('Please enter name and email first', 'err')
    return
  }
  
  showMsg('Sending OTP to ' + email + '...', 'info')
  document.getElementById('sendOtpBtn').disabled = true
  
  try {
    const controller = new AbortController()
    const timeout = setTimeout(() => controller.abort(), 15000)
    
    const res = await fetch('/api/auth/send-otp', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email }),
      signal: controller.signal
    })
    
    clearTimeout(timeout)
    const data = await res.json()
    
    if (data.success) {
      showMsg('✅ OTP sent to ' + email + '! Check inbox and spam folder', 'ok')
      document.getElementById('otpSection').style.display = 'block'
      document.getElementById('sendOtpBtn').style.display = 'none'
    } else {
      showMsg(data.error || 'Failed', 'err')
      document.getElementById('sendOtpBtn').disabled = false
    }
  } catch(e) {
    if (e.name === 'AbortError') {
      showMsg('Server timeout. Try again!', 'err')
    } else {
      showMsg('Error: ' + e.message, 'err')
    }
    document.getElementById('sendOtpBtn').disabled = false
  }
}

async function verifyAndSignup() {
  const name = document.getElementById('name').value.trim()
  const email = document.getElementById('email').value.trim()
  const phone = document.getElementById('phone').value.trim()
  const password = document.getElementById('password').value.trim()
  const otp = document.getElementById('otp').value.trim()
  
  if (!name||!email||!password||!otp) {
    showMsg('Please fill all fields', 'err')
    return
  }
  
  showMsg('Verifying OTP...', 'info')
  
  try {
    const verifyRes = await fetch('/api/auth/verify-otp', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, otp })
    })
    const verifyData = await verifyRes.json()
    
    if (!verifyData.success) {
      showMsg(verifyData.error || 'Wrong OTP', 'err')
      return
    }
    
    showMsg('Creating account...', 'info')
    
    const signupRes = await fetch('/api/auth/signup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, phone, password })
    })
    const signupData = await signupRes.json()
    
    if (signupData.success) {
      localStorage.setItem('glink_user', JSON.stringify(signupData.user))
      showMsg('Account created! Redirecting...', 'ok')
      setTimeout(() => window.location.href = 'dashboard.html', 1500)
    } else {
      showMsg(signupData.error || 'Signup failed', 'err')
    }
  } catch(e) {
    showMsg('Error: ' + e.message, 'err')
  }
}

function showMsg(msg, type) {
  const el = document.getElementById('msg')
  if (!el) {
    alert(msg)
    return
  }
  el.textContent = msg
  el.className = 'msg ' + type
  el.style.display = 'block'
}

</script>
</body>
</html>
