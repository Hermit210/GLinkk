<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile - G-Link</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Manrope', 'sans-serif'],
          },
          colors: {
            gold: {
              DEFAULT: '#FFD700',
              light: '#FFED4E',
              dark: '#FFA500',
            },
            dark: {
              DEFAULT: '#0a0a0a',
              card: '#111111',
              border: '#222222'
            }
          },
          animation: {
            'fade-in-up': 'fadeInUp 0.8s ease-out forwards',
            'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite'
          },
          keyframes: {
            fadeInUp: {
              '0%': { opacity: '0', transform: 'translateY(20px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            }
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #0a0a0a;
      color: #ffffff;
      overflow-x: hidden;
    }

    .bg-site {
      background-image: radial-gradient(circle at 50% 0%, rgba(255, 215, 0, 0.08) 0%, transparent 60%);
      background-attachment: fixed;
    }

    .glass-nav {
      background: rgba(10, 10, 10, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255, 215, 0, 0.1);
    }

    /* Reveal Animation delays */
    .delay-100 {
      animation-delay: 100ms;
    }

    .delay-200 {
      animation-delay: 200ms;
    }

    .delay-300 {
      animation-delay: 300ms;
    }
  </style>
</head>

<body class="bg-dark text-white bg-site font-sans min-h-screen flex flex-col">

  <nav class="fixed top-0 w-full z-50 glass-nav transition-all duration-300" id="mainNav">
    <div class="max-w-6xl mx-auto px-4 lg:px-6">
      <div class="flex items-center justify-between h-20">
        <!-- Main Logo -->
        <a href="/" class="text-xl font-bold tracking-tight text-white flex items-center gap-2 group mr-2">
          <span class="text-gold group-hover:rotate-12 transition-transform duration-300">🪙</span>
          <span class="hidden sm:inline">G-Link</span>
        </a>

        <!-- Desktop Nav Items -->
        <div class="hidden md:flex items-center gap-2">
          <a href="create.html"
            class="px-5 py-2 rounded-xl text-sm font-bold text-gray-300 hover:text-gold hover:bg-gold/10 transition-all flex items-center gap-2">
            <i data-lucide="plus-circle" class="w-4 h-4"></i> Create
          </a>
          <a href="dashboard.html"
            class="px-5 py-2 rounded-xl text-sm font-bold text-gray-300 hover:text-gold hover:bg-gold/10 transition-all flex items-center gap-2">
            <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Dashboard
          </a>
          <a href="transactions.html"
            class="px-5 py-2 rounded-xl text-sm font-bold text-gray-300 hover:text-gold hover:bg-gold/10 transition-all flex items-center gap-2">
            <i data-lucide="activity" class="w-4 h-4"></i> Transactions
          </a>
        </div>

        <!-- User Options (Logged in vs out handled dynamically) -->
        <div class="flex items-center gap-4">
          <div id="userSection"
            class="flex items-center gap-2 px-3 py-2 rounded-lg border border-gold shadow-[0_0_15px_rgba(255,215,0,0.15)] bg-dark/50 hidden">
            <i data-lucide="user" class="w-4 h-4 text-gold"></i>
            <span id="headerUserName" class="text-gold text-sm truncate max-w-[120px]">User</span>
          </div>

          <!-- Hamburger for Mobile -->
          <button id="mobileMenuBtn" class="md:hidden text-gray-400 hover:text-gold transition">
            <i data-lucide="menu" class="w-6 h-6"></i>
          </button>
        </div>
      </div>
    </div>

    <!-- Mobile Menu Dropdown -->
    <div id="mobileMenu"
      class="hidden md:hidden absolute top-full left-0 w-full bg-dark/95 backdrop-blur-xl border-b border-dark-border py-4 px-6 shadow-2xl">
      <nav class="flex flex-col space-y-2">
        <a href="create.html"
          class="flex items-center text-gray-300 hover:text-gold hover:bg-gold/10 rounded-xl p-3 transition">
          <i data-lucide="plus-circle" class="w-5 h-5 mr-3"></i> Create Gold Link
        </a>
        <a href="dashboard.html"
          class="flex items-center text-gray-300 hover:text-gold hover:bg-gold/10 rounded-xl p-3 transition">
          <i data-lucide="layout-dashboard" class="w-5 h-5 mr-3"></i> Dashboard
        </a>
        <a href="transactions.html"
          class="flex items-center text-gray-300 hover:text-gold hover:bg-gold/10 rounded-xl p-3 transition">
          <i data-lucide="activity" class="w-5 h-5 mr-3"></i> Transactions
        </a>
        <button onclick="logout()"
          class="flex items-center text-red-400 hover:bg-red-500/10 rounded-xl p-3 transition text-left">
          <i data-lucide="log-out" class="w-5 h-5 mr-3"></i> Logout
        </button>
      </nav>
    </div>
  </nav>

  <!-- Main Tracking Container -->
  <main class="flex-grow max-w-4xl mx-auto w-full px-4 pt-32 pb-24">

    <!-- Profile Card (GRAIL ID removed) -->
    <div
      class="bg-dark-card backdrop-blur-xl border border-dark-border hover:border-gold/30 rounded-[2rem] p-8 md:p-10 shadow-[0_0_30px_rgba(0,0,0,0.5)] relative overflow-hidden group animate-fade-in-up mb-8 transition-colors">
      <!-- Glow effect -->
      <div
        class="absolute -top-32 -left-32 w-64 h-64 bg-gold/5 blur-[80px] rounded-full pointer-events-none group-hover:bg-gold/10 transition-colors duration-1000">
      </div>

      <div class="flex items-center gap-4 mb-8 relative z-10 border-b border-dark-border/50 pb-6">
        <div
          class="w-16 h-16 rounded-2xl bg-gold/10 border border-gold/30 flex items-center justify-center flex-shrink-0 shadow-[0_0_20px_rgba(255,215,0,0.1)] group-hover:scale-105 transition-transform duration-300">
          <i data-lucide="user" class="w-8 h-8 text-gold translate-x-px"></i>
        </div>
        <div>
          <h2
            class="text-2xl sm:text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-white via-gray-200 to-gray-500 tracking-tight">
            My Profile</h2>
          <p class="text-xs font-bold text-gray-500 uppercase tracking-widest mt-1">Personal Details</p>
        </div>
      </div>

      <div class="space-y-4 relative z-10">
        <div
          class="flex flex-col sm:flex-row sm:justify-between sm:items-center py-3 px-4 rounded-xl hover:bg-gold/5 transition-colors border border-transparent hover:border-gold/20">
          <span class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-1 sm:mb-0"><i
              data-lucide="badge-check" class="w-4 h-4 inline-block mr-2 text-gold -translate-y-px"></i>Name</span>
          <span class="text-lg font-bold text-white tracking-wide" id="profileName">-</span>
        </div>

        <div
          class="flex flex-col sm:flex-row sm:justify-between sm:items-center py-3 px-4 rounded-xl hover:bg-gold/5 transition-colors border border-transparent hover:border-gold/20">
          <span class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-1 sm:mb-0"><i data-lucide="mail"
              class="w-4 h-4 inline-block mr-2 text-gold -translate-y-px"></i>Email Address</span>
          <span class="text-lg font-bold text-gray-300 tracking-wide" id="profileEmail">-</span>
        </div>

        <div
          class="flex flex-col sm:flex-row sm:justify-between sm:items-center py-3 px-4 rounded-xl hover:bg-gold/5 transition-colors border border-transparent hover:border-gold/20">
          <span class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-1 sm:mb-0"><i data-lucide="phone"
              class="w-4 h-4 inline-block mr-2 text-gold -translate-y-px"></i>Phone Number</span>
          <span class="text-lg font-bold text-gray-300 tracking-wide" id="profilePhone">-</span>
        </div>
      </div>

      <div class="mt-8 pt-6 border-t border-dark-border/50 relative z-10 flex justify-end">
        <button onclick="logout()"
          class="flex items-center gap-2 bg-red-500/10 hover:bg-red-500 hover:text-white text-red-500 px-5 py-2.5 rounded-xl text-sm font-bold transition-all border border-red-500/20 shadow-[0_0_15px_rgba(239,68,68,0.1)]">
          <i data-lucide="log-out" class="w-4 h-4"></i> Disconnect Account
        </button>
      </div>
    </div>

    <!-- Recent Transactions Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 relative z-10">
      <!-- Dashboard Transactions -->
      <div
        class="bg-dark-card backdrop-blur-xl border border-dark-border hover:border-gold/30 rounded-[2rem] p-6 sm:p-8 shadow-[0_0_30px_rgba(0,0,0,0.5)] opacity-0 animate-fade-in-up delay-100 flex flex-col h-[400px]">
        <div class="flex items-center gap-3 mb-6">
          <i data-lucide="history" class="w-5 h-5 text-gold"></i>
          <h3 class="text-xl font-bold text-white tracking-tight">Recent Transactions</h3>
        </div>
        <div id="transactions" class="flex-grow overflow-y-auto pr-2 space-y-3 no-scrollbar">
          <div class="flex items-center justify-center h-full">
            <div class="animate-spin w-8 h-8 border-4 border-dark-border border-t-gold rounded-full"></div>
          </div>
        </div>
      </div>

      <!-- Recent Blessings Formulated -->
      <div
        class="bg-dark-card backdrop-blur-xl border border-dark-border hover:border-gold/30 rounded-[2rem] p-6 sm:p-8 shadow-[0_0_30px_rgba(0,0,0,0.5)] opacity-0 animate-fade-in-up delay-200 flex flex-col h-[400px]">
        <div class="flex items-center gap-3 mb-6">
          <i data-lucide="gift" class="w-5 h-5 text-gold"></i>
          <h3 class="text-xl font-bold text-white tracking-tight">Recent Blessings</h3>
        </div>
        <div id="recentBlessings" class="flex-grow overflow-y-auto pr-2 space-y-3 no-scrollbar">
          <div class="flex items-center justify-center h-full">
            <div class="animate-spin w-8 h-8 border-4 border-dark-border border-t-gold rounded-full"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Full Width My Blessing Pages -->
    <div
      class="bg-dark-card backdrop-blur-xl border border-dark-border hover:border-gold/30 rounded-[2rem] p-6 sm:p-8 shadow-[0_0_30px_rgba(0,0,0,0.5)] opacity-0 animate-fade-in-up delay-300 mt-8">
      <div class="flex items-center gap-3 mb-6">
        <i data-lucide="layout-grid" class="w-5 h-5 text-gold"></i>
        <h3 class="text-xl font-bold text-white tracking-tight">My Blessing Pages</h3>
      </div>
      <div id="myBlessingPages" class="space-y-4">
        <div class="flex items-center justify-center py-10">
          <div class="animate-spin w-8 h-8 border-4 border-dark-border border-t-gold rounded-full"></div>
        </div>
      </div>
    </div>

  </main>

  <!-- Floating Mobile Menu Control Script -->
  <script>
    lucide.createIcons();

    // Hide scrollbar utility for the transaction lists
    const style = document.createElement('style');
    style.innerHTML = `
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    `;
    document.head.appendChild(style);

    // Better authentication check
    function getUser() {
      try {
        const userData = localStorage.getItem('glink_user')
        if (!userData || userData === 'null' || userData === 'undefined') return null;
        return JSON.parse(userData)
      } catch (error) { return null; }
    }

    const user = getUser()
    if (!user) { window.location.href = 'login.html' }

    // Update Headers
    document.getElementById('headerUserName').textContent = user?.name || user?.email || 'User';
    document.getElementById('userSection').classList.remove('hidden');

    // Profile Fields
    document.getElementById('profileName').textContent = user?.name || '-';
    document.getElementById('profileEmail').textContent = user?.email || '-';
    document.getElementById('profilePhone').textContent = user?.phone || '-';

    // Mobile menu toggle
    const mobileMenuBtn = document.getElementById('mobileMenuBtn');
    const mobileMenu = document.getElementById('mobileMenu');
    if (mobileMenuBtn && mobileMenu) {
      mobileMenuBtn.addEventListener('click', () => {
        mobileMenu.classList.toggle('hidden');
        const icon = mobileMenuBtn.querySelector('i');
        if (mobileMenu.classList.contains('hidden')) {
          icon.setAttribute('data-lucide', 'menu');
        } else {
          icon.setAttribute('data-lucide', 'x');
        }
        lucide.createIcons();
      });
    }

    async function loadProfile() {
      // Load general profile data
      try {
        const res = await fetch('/api/dashboard?email=' + user.email)
        const data = await res.json()
        if (data.success) {
          // If a new grailId was fetched from backend and needed storage, do it quietly without UI update
          if (data.grailUserId) {
            const updated = { ...user, grail_user_id: data.grailUserId }
            localStorage.setItem('glink_user', JSON.stringify(updated))
          }

          const txDiv = document.getElementById('transactions')
          if (!data.transactions.length) {
            txDiv.innerHTML = `
                <div class="flex flex-col items-center justify-center h-full text-center py-10">
                    <i data-lucide="inbox" class="w-10 h-10 text-gray-600 mb-3"></i>
                    <p class="text-gray-400 font-bold text-sm">No transactions yet.</p>
                    <p class="text-gray-500 text-xs mt-1">Send or receive gold to see activity here.</p>
                </div>
            `;
            lucide.createIcons();
          } else {
            txDiv.innerHTML = data.transactions.map(t => `
              <div class="flex items-center justify-between p-4 rounded-xl bg-dark/50 border border-dark-border hover:border-gold/30 hover:bg-gold/5 transition-colors">
                <div>
                   <div class="text-white font-bold text-sm tracking-wide capitalize">${t.type.replace(/_/g, ' ')}</div>
                   <div class="text-gray-500 text-xs font-medium tracking-wide mt-0.5">${new Date(t.created_at).toLocaleDateString('en-IN')}</div>
                </div>
                <div class="text-right">
                    <div class="text-gold font-extrabold text-sm">${t.gold_grams}g</div>
                    <div class="text-gray-400 text-xs font-bold mt-0.5 tracking-wider">₹${t.amount_inr}</div>
                </div>
              </div>
            `).join('')
          }
        }
      } catch (e) {
        console.log('Profile error:', e)
        document.getElementById('transactions').innerHTML = `<p class="text-red-500 text-sm">Error loading transactions.</p>`;
      }

      // Load blessing pages
      try {
        const blessRes = await fetch('/api/blessing/my?email=' + user.email)
        const blessData = await blessRes.json()
        const blessDiv = document.getElementById('myBlessingPages')
        if (!blessData.success || !blessData.blessings.length) {
          blessDiv.innerHTML = `
            <div class="text-center py-8">
                <p class="text-gray-400 font-bold text-sm">No blessing pages created yet.</p>
                <a href="create.html" class="inline-flex items-center gap-2 text-gold mt-2 hover:text-gold-light text-sm font-bold transition-colors">
                    Create your first page <i data-lucide="arrow-right" class="w-4 h-4"></i>
                </a>
            </div>
          `;
          lucide.createIcons();
        } else {
          blessDiv.innerHTML = blessData.blessings.map(page => `
            <div class="flex flex-col sm:flex-row sm:items-center justify-between p-5 rounded-2xl bg-dark/50 border border-dark-border hover:border-gold/30 hover:bg-gold/5 transition-all gap-4">
              <div>
                <div class="text-white font-bold text-base tracking-wide">${page.occasion} - ${page.name}</div>
                <div class="text-gray-500 text-xs font-bold tracking-widest uppercase mt-1">Created ${new Date(page.created_at).toLocaleDateString('en-IN')}</div>
              </div>
              <div class="flex flex-col sm:items-end w-full sm:w-auto mt-2 sm:mt-0 pt-3 border-t sm:border-none border-dark-border/50">
                <div class="text-gold font-extrabold text-lg">${page.total_gold}g <span class="text-gray-400 text-xs uppercase tracking-widest font-bold ml-1">Total Minted</span></div>
                <div class="text-gray-400 text-xs font-bold mt-1">₹${Math.round(page.total_inr)} from <span class="text-white">${page.blesser_count} blessers</span></div>
                
                <a href="/blessing.html?id=${page.id}" target="_blank" class="mt-4 sm:mt-3 inline-flex items-center gap-2 justify-center sm:justify-start w-full sm:w-auto bg-gold/10 hover:bg-gold hover:text-black text-gold border border-gold/30 px-4 py-2 rounded-xl text-xs uppercase tracking-widest font-extrabold transition-all group">
                    Visit Page <i data-lucide="external-link" class="w-3 h-3 group-hover:translate-x-0.5 transition-transform"></i>
                </a>
              </div>
            </div>
          `).join('');
          lucide.createIcons();
        }
      } catch (e) {
        console.log('Blessing pages load error:', e)
        document.getElementById('myBlessingPages').innerHTML = `<p class="text-red-500 text-sm">Error loading pages.</p>`;
      }

      // Load recent blessings sent
      try {
        const blessRes = await fetch('/api/registry/blessing')
        const blessData = await blessRes.json()
        const userBlessings = blessData.gifts.filter(g => g.email === user.email).slice(-5)
        const blessDiv = document.getElementById('recentBlessings')

        if (!userBlessings.length) {
          blessDiv.innerHTML = `
            <div class="flex flex-col items-center justify-center h-full text-center py-10">
                <i data-lucide="gift" class="w-10 h-10 text-gray-600 mb-3"></i>
                <p class="text-gray-400 font-bold text-sm">No blessings sent yet.</p>
                <p class="text-gray-500 text-xs mt-1">Bless someone with gold to see it here.</p>
            </div>
          `;
          lucide.createIcons();
        } else {
          blessDiv.innerHTML = userBlessings.map(b => `
            <div class="flex items-center justify-between p-4 rounded-xl bg-dark/50 border border-dark-border hover:border-gold/30 hover:bg-gold/5 transition-colors">
                <div>
                   <div class="text-white font-bold text-sm tracking-wide">Blessed ${b.registry_slug}</div>
                   <div class="text-gray-500 text-xs font-medium tracking-wide mt-0.5">${new Date(b.created_at).toLocaleDateString('en-IN')}</div>
                </div>
                <div class="text-right">
                    <div class="text-gold font-extrabold text-sm">${b.gold_grams}g</div>
                    <div class="text-gray-400 text-xs font-bold mt-0.5 tracking-wider">₹${b.amount_inr}</div>
                </div>
            </div>
          `).join('')
        }
      } catch (e) {
        console.log('Blessings load error:', e)
        document.getElementById('recentBlessings').innerHTML = `<p class="text-red-500 text-sm">Error loading sent blessings.</p>`;
      }
    }

    function logout() {
      if (confirm('Are you sure you want to disconnect?')) {
        localStorage.removeItem('glink_user')
        localStorage.removeItem('glink_wallet')
        localStorage.removeItem('glink_wallet_name')
        window.location.href = 'index.html'
      }
    }

    loadProfile()
  </script>
</body>

</html>
